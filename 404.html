<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oops，404</title>
    <style>
        body {
            background: #000000;
        }

        .head {
            font-weight: 800;
            font-size: 140px;
            color: #fff;
            font-family: "Open Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
            text-align: center;
            display: block;
            margin-top: 70px;
        }

        .motto {
            font-size: 16px;
            color: #fff;
            text-align: center;
            margin-top: 10px;
            font-family: "Open Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
            display: block;
        }

        .astronaut {
            position: relative;
            z-index: 1;
            width: 150px;
            display: block;
            margin: 20px auto
        }


        .floating {
            -webkit-animation-name: Floatingx;
            -webkit-animation-duration: 5s;
            -webkit-animation-iteration-count: infinite;
            -webkit-animation-timing-function: ease-in-out;
            -moz-animation-name: Floating;
            -moz-animation-duration: 5s;
            -moz-animation-iteration-count: infinite;
            -moz-animation-timing-function: ease-in-out
        }

        @-webkit-keyframes Floatingx {
            from {
                -webkit-transform: translate(0, 0px)
            }

            65% {
                -webkit-transform: translate(0, 15px)
            }

            to {
                -webkit-transform: translate(0, 0px)
            }
        }

        @-moz-keyframes Floating {
            from {
                -moz-transform: translate(0, 0px)
            }

            65% {
                -moz-transform: translate(0, 15px)
            }

            to {
                -moz-transform: translate(0, 0px)
            }
        }

        .btn-light:hover,
        .btn-light:focus,
        .btn-light:active {
            background-color: #fff;
            color: #111216 !important;
        }

        .row {
            width: 100%;
            text-align: center;
        }

        .btn-light {
            color: #fff;
            border: 1px solid #fff;
            text-decoration: none;
            display: inline-block;
            padding: 0;
            background-color: transparent;
            font-family: "Open Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            vertical-align: middle;
            text-align: center;
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
            -moz-osx-font-smoothing: grayscale;
            -webkit-transition-duration: 0.3s;
            transition-duration: 0.3s;
            -webkit-transition-property: color, background-color, border-color;
            transition-property: color, background-color, border-color;
            position: relative;
            height: 45px;
            width: 170px;
            line-height: 45px;

        }

        .earth {
            width: 100%;
            position: fixed;
            right: 0;
            left: 0;
            bottom: 0;
            z-index: 0;
            height: 25%;
        }
    </style>
</head>

<body>
    <span class="head">404</span>
    <span class="motto">You just stray too far from the ship!</span>
    <img class="astronaut floating" src="https://cdn.jsdelivr.net/gh/chiperman/Photos-storage@master/404/astronaut.png"
        alt="astronaut">
    <div class="row">
        <a href="https://chiperman.github.io/" class="btn-light"> 博客首页 </a>
    </div>
    <img class="earth" src="https://cdn.jsdelivr.net/gh/chiperman/Photos-storage@master/404/earth.png" alt="earth">
</body>

</html>
